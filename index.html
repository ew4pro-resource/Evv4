<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Calvin &amp; Hobbes — Starry Night</title>
<style>
  html, body {
    margin: 0;
    height: 100%;
    background: #000;
    overflow: hidden;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    color: #cfd6e4;
  }
  /* 1920x1095 stage — scaled to fill viewport while preserving aspect ratio */
  #stage {
    position: fixed;
    inset: 0;
    display: grid;
    place-items: center;
  }
  #scene {
    position: relative;
    width: 1920px;
    height: 1095px;
    transform-origin: center center;
    background: #000 url("assets/background.jpg") center/cover no-repeat;
  }
  #stars {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
  }
  /* audio toggle, fixed to viewport so scaling doesn't shrink it */
  #audio-toggle {
    position: fixed;
    right: max(18px, env(safe-area-inset-right, 0px));
    bottom: max(18px, calc(env(safe-area-inset-bottom, 0px) + 8px));
    z-index: 5;
    width: 46px;
    height: 46px;
    border-radius: 50%;
    border: 1px solid rgba(255,255,255,0.22);
    background: rgba(15,18,28,0.55);
    color: #e6ecf6;
    backdrop-filter: blur(6px);
    -webkit-backdrop-filter: blur(6px);
    cursor: pointer;
    display: grid;
    place-items: center;
    transition: background 120ms ease, transform 120ms ease;
  }
  #audio-toggle:hover { background: rgba(30,36,52,0.7); transform: scale(1.04); }
  #audio-toggle svg { width: 20px; height: 20px; fill: currentColor; }
  #hint {
    position: fixed;
    right: 74px;
    bottom: 28px;
    z-index: 5;
    font-size: 12px;
    letter-spacing: 0.04em;
    opacity: 0.55;
    pointer-events: none;
    transition: opacity 600ms ease;
  }
  #hint.gone { opacity: 0; }

  /* ---- 翻页阅读层 ---- */
  #reader {
    position: fixed;
    inset: 0;
    z-index: 3;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 8vh 24px 14vh;
    box-sizing: border-box;
    cursor: pointer;
    user-select: none;
    -webkit-user-select: none;
    -webkit-tap-highlight-color: transparent;
  }
  #reader-text {
    max-width: 620px;
    width: 100%;
    font-size: 15.5px;
    line-height: 1.95;
    letter-spacing: 0.02em;
    color: rgba(236, 240, 250, 0.94);
    text-shadow: 0 1px 6px rgba(0, 0, 0, 0.75), 0 0 18px rgba(0, 0, 0, 0.45);
    white-space: pre-wrap;
    word-break: break-word;
    transition: opacity 420ms ease;
    opacity: 1;
  }
  #reader-text.fading { opacity: 0; }
  #reader-meta {
    position: fixed;
    top: max(16px, env(safe-area-inset-top, 0px));
    right: max(16px, env(safe-area-inset-right, 0px));
    z-index: 4;
    font-size: 12px;
    letter-spacing: 0.18em;
    color: rgba(220, 228, 240, 0.55);
    pointer-events: none;
    font-variant-numeric: tabular-nums;
  }
  #reader-meta .dim { opacity: 0.5; margin-left: 2px; }
  #reader-tap-hint {
    position: fixed;
    bottom: max(14px, env(safe-area-inset-bottom, 0px));
    left: 50%;
    transform: translateX(-50%);
    z-index: 4;
    font-size: 11px;
    letter-spacing: 0.18em;
    color: rgba(220, 228, 240, 0.5);
    pointer-events: none;
    transition: opacity 600ms ease;
  }
  #reader-tap-hint.gone { opacity: 0; }
  @media (orientation: portrait) {
    #reader { padding: 7vh 18px 12vh; }
    #reader-text { font-size: 14px; line-height: 1.88; }
  }

  /* ---- 起始按钮：纯白圆形，居中 ---- */
  #start-btn {
    position: fixed;
    left: 50%;
    top: 50%;
    transform: translate(-50%, -50%);
    z-index: 6;
    width: 64px;
    height: 64px;
    padding: 0;
    border: 0;
    border-radius: 50%;
    background: #ffffff;
    cursor: pointer;
    box-shadow:
      0 0 0 1px rgba(255, 255, 255, 0.08),
      0 0 28px rgba(255, 255, 255, 0.18),
      0 0 60px rgba(255, 255, 255, 0.08);
    transition:
      transform 240ms cubic-bezier(0.2, 0.7, 0.2, 1),
      opacity 480ms ease,
      box-shadow 240ms ease;
    -webkit-tap-highlight-color: transparent;
  }
  #start-btn:hover {
    transform: translate(-50%, -50%) scale(1.06);
    box-shadow:
      0 0 0 1px rgba(255, 255, 255, 0.16),
      0 0 36px rgba(255, 255, 255, 0.32),
      0 0 80px rgba(255, 255, 255, 0.12);
  }
  #start-btn:active { transform: translate(-50%, -50%) scale(0.96); }
  #start-btn.gone {
    opacity: 0;
    pointer-events: none;
    transform: translate(-50%, -50%) scale(0.7);
  }
  @media (orientation: portrait) {
    #start-btn { width: 56px; height: 56px; }
  }

  /* ---- 竖屏 / 窄屏：填满视口，居中聚焦卡尔文和霍布斯 ---- */
  @media (orientation: portrait) {
    #stage { display: block; }
    #scene {
      width: 100vw;
      height: 100vh;
      height: 100dvh;
      transform: none !important;
      background-size: cover;
      background-position: center center;
    }
    #hint { right: 64px; bottom: 28px; font-size: 11px; }
    #audio-toggle { width: 42px; height: 42px; }
  }
</style>
</head>
<body>

<div id="stage">
  <div id="scene">
    <canvas id="stars" width="1920" height="1095"></canvas>
  </div>
</div>

<div id="reader" role="button" aria-label="翻到下一段">
  <div id="reader-text"></div>
</div>
<div id="reader-meta"><span id="reader-idx">1</span><span class="dim"> / 7</span></div>
<div id="reader-tap-hint">轻触屏幕继续 →</div>
<button id="start-btn" aria-label="开始"></button>

<audio id="bgm" src="assets/lofi.mp3" loop preload="auto"></audio>

<script>
  // ---- fit the 1920x1095 stage into the viewport, preserving aspect ratio ----
  const SCENE_W = 1920;
  const SCENE_H = 1095;
  const scene = document.getElementById('scene');
  const canvasEl = document.getElementById('stars');
  const portrait = window.matchMedia('(orientation: portrait)');
  function fit() {
    if (portrait.matches) {
      // portrait: background uses cover; mirror that on the canvas so stars
      // align with the image and crop the same way.
      scene.style.transform = '';
      const vw = window.innerWidth;
      const vh = window.innerHeight;
      const cover = Math.max(vw / SCENE_W, vh / SCENE_H);
      const w = SCENE_W * cover;
      const h = SCENE_H * cover;
      canvasEl.style.position = 'absolute';
      canvasEl.style.left   = ((vw - w) / 2) + 'px';
      canvasEl.style.top    = ((vh - h) / 2) + 'px';
      canvasEl.style.width  = w + 'px';
      canvasEl.style.height = h + 'px';
      canvasEl.style.inset  = 'auto';
      return;
    }
    // landscape / desktop: reset canvas overrides, scale the whole scene
    canvasEl.style.cssText = '';
    const s = Math.min(window.innerWidth / SCENE_W, window.innerHeight / SCENE_H);
    scene.style.transform = `scale(${s})`;
  }
  fit();
  window.addEventListener('resize', fit);
  window.addEventListener('orientationchange', fit);
  portrait.addEventListener?.('change', fit);

  // ---- star particles ----
  // Y-coordinates in scene.json use a bottom-origin convention. We flip them to
  // top-origin (CSS) by Y_css = SCENE_H - y.
  const emitters = [
    { name: 'Top Left',       x:  370.06, y:  908.25, scale: 1.00, count: 24 },
    { name: 'Middle Left',    x:  461.05, y:  590.61, scale: 1.00, count: 24 },
    { name: 'Outside Left',   x:  -32.20, y:  584.65, scale: 1.00, count: 20 },
    { name: 'Top Middle',     x:  950.86, y:  914.30, scale: 1.00, count: 24 },
    { name: 'Bottom Mid A',   x: 1012.47, y:  646.39, scale: 0.64, alpha: 0.75, count: 12 },
    { name: 'Bottom Mid B',   x:  688.76, y:  440.84, scale: 0.64, alpha: 0.75, count: 12 },
    { name: 'Bottom Mid C',   x: 1362.51, y:  425.21, scale: 0.64, alpha: 0.75, count: 12 },
    { name: 'Top Right',      x: 1581.53, y:  830.12, scale: 1.00, count: 24 },
    { name: 'Middle Right',   x: 1634.70, y:  612.30, scale: 1.00, count: 24 },
    { name: 'Outside Right',  x: 2005.89, y:  590.39, scale: 1.00, count: 20 },
  ];

  const canvas = document.getElementById('stars');
  const ctx = canvas.getContext('2d');

  const stars = [];
  for (const e of emitters) {
    const cssX = e.x;
    const cssY = SCENE_H - e.y;
    const radius = 140 * e.scale; // emitter spread in scene units
    const maxAlpha = e.alpha ?? 1.0;
    for (let i = 0; i < e.count; i++) {
      const t = Math.random() * Math.PI * 2;
      const r = Math.sqrt(Math.random()) * radius;
      stars.push({
        x: cssX + Math.cos(t) * r,
        y: cssY + Math.sin(t) * r,
        size: (Math.random() * 1.4 + 0.6) * (0.7 + e.scale * 0.6),
        // twinkle: each star has its own phase + speed
        phase: Math.random() * Math.PI * 2,
        speed: 0.6 + Math.random() * 1.4,
        baseAlpha: (0.35 + Math.random() * 0.55) * maxAlpha,
      });
    }
  }

  // shooting star — single instance, periodically recycled
  const shooter = {
    active: false,
    nextAt: 1.2,
    x: 0, y: 0,
    vx: 0, vy: 0,
    life: 0,
    maxLife: 1.4,
  };

  function launchShooter() {
    // launch from upper-left-ish to lower-right; slight randomization
    const startX = 200 + Math.random() * 600;
    const startY = 50 + Math.random() * 200;
    const angle = (Math.PI / 7) + Math.random() * (Math.PI / 6); // ~25° to ~55°
    const speed = 1100 + Math.random() * 600; // px/sec at scene scale
    shooter.x = startX;
    shooter.y = startY;
    shooter.vx = Math.cos(angle) * speed;
    shooter.vy = Math.sin(angle) * speed;
    shooter.life = 0;
    shooter.active = true;
    shooter.trail = [];
  }

  let last = performance.now();
  function frame(now) {
    const dt = Math.min(0.05, (now - last) / 1000);
    last = now;

    ctx.clearRect(0, 0, SCENE_W, SCENE_H);

    // twinkling stars
    for (const s of stars) {
      s.phase += dt * s.speed;
      const tw = 0.5 + 0.5 * Math.sin(s.phase);
      const a = s.baseAlpha * (0.25 + tw * 0.75);
      const r = s.size * (0.85 + tw * 0.35);
      ctx.beginPath();
      ctx.arc(s.x, s.y, r, 0, Math.PI * 2);
      // soft glow via radial gradient is expensive — use additive composite + fill
      ctx.fillStyle = `rgba(255, 240, 210, ${a})`;
      ctx.fill();
      // tiny halo
      ctx.beginPath();
      ctx.arc(s.x, s.y, r * 2.6, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(255, 230, 180, ${a * 0.12})`;
      ctx.fill();
    }

    // shooting star
    shooter.nextAt -= dt;
    if (!shooter.active && shooter.nextAt <= 0) {
      launchShooter();
      shooter.nextAt = 6 + Math.random() * 9; // next one in 6-15s
    }
    if (shooter.active) {
      shooter.x += shooter.vx * dt;
      shooter.y += shooter.vy * dt;
      shooter.life += dt;
      const t = shooter.life / shooter.maxLife;
      if (t >= 1 || shooter.x > SCENE_W + 200 || shooter.y > SCENE_H + 200) {
        shooter.active = false;
      } else {
        // draw a streak: short bright head + fading tail in the opposite direction of velocity
        const ang = Math.atan2(shooter.vy, shooter.vx);
        const tailLen = 220;
        const tx = shooter.x - Math.cos(ang) * tailLen;
        const ty = shooter.y - Math.sin(ang) * tailLen;
        const grad = ctx.createLinearGradient(shooter.x, shooter.y, tx, ty);
        const headA = (1 - t) * 0.95;
        grad.addColorStop(0, `rgba(255, 255, 235, ${headA})`);
        grad.addColorStop(0.4, `rgba(200, 220, 255, ${headA * 0.5})`);
        grad.addColorStop(1, `rgba(180, 200, 255, 0)`);
        ctx.strokeStyle = grad;
        ctx.lineWidth = 2.4;
        ctx.lineCap = 'round';
        ctx.beginPath();
        ctx.moveTo(tx, ty);
        ctx.lineTo(shooter.x, shooter.y);
        ctx.stroke();
        // bright head dot
        ctx.beginPath();
        ctx.arc(shooter.x, shooter.y, 2.2, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(255, 255, 245, ${headA})`;
        ctx.fill();
      }
    }

    requestAnimationFrame(frame);
  }
  requestAnimationFrame((t) => { last = t; frame(t); });

  // ---- audio ---- (started together with the reader, on first user gesture)
  const bgm = document.getElementById('bgm');
  bgm.volume = 0.6;

  // ---- 翻页阅读 ----
  const segments = [
`如果明天重庆突然地震了 没有信号 我找不到你 电话打不通 我自己也被困住了 用力推开废墟之后 发现 原来没有导航 我甚至一辈子找不到你 原来会走丢的也不止有小孩
那个时候
会不会突然发现
原来一直拥有的 一直反复折磨至筋疲力尽的人其实是最珍贵的 最不可替代的`,

`今天我24岁了 很难想象离自己成年已经6年了 更难想象的是 我已经成年了这种感觉还是会很不真实 成长的感觉就是这么奇怪呢 或许只有别人看来你才是个大人

11-14岁的愿望都是逃离一外
16岁的愿望是能考上各种四字大学
17岁的愿望是找个女朋友
18岁的愿望是不挂科
19岁又开始幻想考上各种四字大学了

20岁之后不再相信虚假的许愿 只是想永远洗刷掉我的卑劣 撤回掉所有在我身上打磨失败的痕迹 我讨厌我的原生家庭 要是我的父亲没有不相信我 没有如此对我打压 我或许不会那么自卑 也许我可以在更早的时候拥有更多朋友 我不用这么渴望被人关注 我可以在说话的时候不结巴 我可以在别人面前表现的更自然 我能更有勇气点开我喜欢的女生的聊天框`,

`我敏感又自卑 我自负又脆弱 我虚伪又真实 逃不出的过去永远会把我拉回原地 我太想做正确的事情以致于一件事情都没有做对 我对自己的爱是畸形的 但是我太怕失去了 没有这种无限满足自己当下需求的爱 我一天都过不下去 我真的会想结束自己的生命

可是我又好怕死 我好怕痛苦 可是为什么大家都可以那么光鲜亮丽 为什么每个人的朋友圈都在国外旅游？我可不需要在这种方面特别啊！我也想让别人有我这样的嫉妒 我真的不想被抛弃..

为什么这些人可以这么不负责任？为什么付出真心的我会被这样对待 我真的很羡慕他们 仿佛这个世界上的所有人的善良都是他们的资源一样`,

`我恨我自己不够坏 我恨我自己做了不负责任的事情还有愧疚感 在这个世界上作为一个好人并不会有任何嘉奖 我并不觉得我遭受的事情符合什么狗屁因果报应

我尝试变坏 我开始把自己包装成一个什么都无所谓的人 很吓人的人 不用负担任何的人 不用在乎任何的人 哪怕我内心真的不向往 可是我真的不想再被伤害了 大家对我真的很坏 我要假装我是可以超社会的

我甚至打算去抽烟 最极点的时候甚至想过要是我能下定决心去纹个花臂 结果会不会不一样 那是我想过最吓人的事情了

可是我还是不争气的会在乎别人的想法 我还是会难过 身为男子汉的我竟然会流眼泪！我他妈根本就不想这样啊`,

`在一外最痛苦的时候我总是会想很宏大的事情，会想人类可能在未来也没办法观测到自己的渺小，或许直到灭绝都无法走出太阳系。在星球毁灭的瞬间，我今天被扣的操行分可以被赦免吗？喔希望那些伟大的人死掉，他们死掉的时候会不会和我一样渺小？

想到这些的时候 我觉得我是自由的 我羡慕学校里的流浪猫 无数的人都都会投喂它 不过转念一想 小猫应该没办法打游戏吧 那我还是好一些？

再转念一想 妈妈把我手机也没收了 更难过了 T^T`,

`你 我不用说名字也可以称呼你  我真的想告诉你 下意识说谎 逃避 会在自卑的时候连走路都差点忘记 这都是你身为一个"人"会有的东西 乐子横行的时代 想做自己真的太难了 一切的空气都让你压抑 又不让你逃跑 当跑回自己内心最深处的小房子的时候 那里甚至也不会有第二个人存在 你的痛苦和挣扎被忽视 没有人会爱你 真的没有 哪怕即使有无数人可以用尽辞藻极力表现出动物的情感 可是那不是爱 你也知道

我不同情你 你和我是一样的
你是很善良的人 我从来也不觉得你内心真正的部分有被看到过 请多多爱护它吧 它真的被关在那个小房子太久了

虽然直到你昨天你向我撒谎的时候 我仍然感觉这个轮回还没有结束 但是我真的相信爱 让我想起来我第一次见毛豆 那个时候它才三个月大 还会躲在床底下 带他回家的时候甚至会找各种地方藏着待一天 我真的很爱他很爱他 现在的他已经完全是个大人了 虽然还是很茸 他可能都回想不到自己小毛的时候吧！他现在哪怕把我充电线咬坏了都还是会蹭过来茸我 哪里有这种毛娃嘛！

我爱你，这也是我作为人 最特别的一点了 我希望它可以改变这个轮回 反正都是20几岁 说不定哪天你也记不得小涵的时候呢`,

`在过去所有人都死掉的时候，我还是想告诉你。
我真的很喜欢你

原来到现在所有的所有都不需要任何的修饰和自我感动 这个世界并不是剧本 我做的事情也不需要符合逻辑 爱是不可预测的

我不能告诉你太多秘密因为我很难不在明年这个时候告诉你更多 为什么是我呢？ 为什么是你呢？ 为什么可以我爱你？ 为什么我们还是会吵架？为什么毛豆总是闭着眼睛？ 为什么粉仗助这么贵？

为什么我还是好喜欢你

                                                                — Ew4`,
  ];

  const reader = document.getElementById('reader');
  const readerText = document.getElementById('reader-text');
  const readerMeta = document.getElementById('reader-meta');
  const readerIdx = document.getElementById('reader-idx');
  const readerTapHint = document.getElementById('reader-tap-hint');
  const startBtn = document.getElementById('start-btn');
  let segIdx = 0;
  let segLock = false;
  let started = false;

  // hide text / meta / hint until the start button is pressed
  readerText.style.opacity = '0';
  readerMeta.style.opacity = '0';
  readerTapHint.style.opacity = '0';

  function renderSeg(i) {
    readerText.textContent = segments[i];
    readerIdx.textContent = String(i + 1);
  }

  function start() {
    if (started) return;
    started = true;
    startBtn.classList.add('gone');
    // kick off background music — this runs inside the click handler so
    // browsers count it as a user gesture and allow playback.
    bgm.play().catch((err) => console.warn('audio play blocked:', err));
    renderSeg(0);
    // let inline opacity:0 clear so CSS transition fades them in
    readerText.style.transition = 'opacity 600ms ease';
    readerMeta.style.transition = 'opacity 600ms ease';
    readerTapHint.style.transition = 'opacity 600ms ease';
    // next tick so the transition picks up the change
    requestAnimationFrame(() => {
      readerText.style.opacity = '';
      readerMeta.style.opacity = '';
      readerTapHint.style.opacity = '';
    });
    setTimeout(() => readerTapHint.classList.add('gone'), 9000);
  }

  function advance() {
    if (!started) return;
    if (segLock) return;
    if (segIdx >= segments.length - 1) return; // stop at the last one, no loop
    segLock = true;
    readerText.classList.add('fading');
    setTimeout(() => {
      segIdx += 1;
      renderSeg(segIdx);
      readerText.classList.remove('fading');
      segLock = false;
    }, 420);
    readerTapHint.classList.add('gone');
  }

  startBtn.addEventListener('click', (e) => {
    e.stopPropagation();
    start();
  });
  reader.addEventListener('click', advance);
  // keyboard support for desktop
  window.addEventListener('keydown', (e) => {
    if (e.key === ' ' || e.key === 'ArrowRight' || e.key === 'Enter') {
      e.preventDefault();
      if (!started) start();
      else advance();
    }
  });
</script>
</body>
</html>

<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Calvin &amp; Hobbes — Starry Night</title>
<style>
  html, body {
    margin: 0;
    height: 100%;
    background: #000;
    overflow: hidden;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    color: #cfd6e4;
  }
  /* 1920x1095 stage — scaled to fill viewport while preserving aspect ratio */
  #stage {
    position: fixed;
    inset: 0;
    display: grid;
    place-items: center;
  }
  #scene {
    position: relative;
    width: 1920px;
    height: 1095px;
    transform-origin: center center;
    background: #000 url("assets/background.jpg") center/cover no-repeat;
  }
  #stars {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
  }
  /* audio toggle, fixed to viewport so scaling doesn't shrink it */
  #audio-toggle {
    position: fixed;
    right: max(18px, env(safe-area-inset-right, 0px));
    bottom: max(18px, calc(env(safe-area-inset-bottom, 0px) + 8px));
    z-index: 5;
    width: 46px;
    height: 46px;
    border-radius: 50%;
    border: 1px solid rgba(255,255,255,0.22);
    background: rgba(15,18,28,0.55);
    color: #e6ecf6;
    backdrop-filter: blur(6px);
    -webkit-backdrop-filter: blur(6px);
    cursor: pointer;
    display: grid;
    place-items: center;
    transition: background 120ms ease, transform 120ms ease;
  }
  #audio-toggle:hover { background: rgba(30,36,52,0.7); transform: scale(1.04); }
  #audio-toggle svg { width: 20px; height: 20px; fill: currentColor; }
  #hint {
    position: fixed;
    right: 74px;
    bottom: 28px;
    z-index: 5;
    font-size: 12px;
    letter-spacing: 0.04em;
    opacity: 0.55;
    pointer-events: none;
    transition: opacity 600ms ease;
  }
  #hint.gone { opacity: 0; }

  /* ---- 竖屏 / 窄屏：填满视口，居中聚焦卡尔文和霍布斯 ---- */
  @media (orientation: portrait) {
    #stage { display: block; }
    #scene {
      width: 100vw;
      height: 100vh;
      height: 100dvh;
      transform: none !important;
      background-size: cover;
      background-position: center center;
    }
    #stars { display: none; }
    #hint { right: 64px; bottom: 28px; font-size: 11px; }
    #audio-toggle { width: 42px; height: 42px; }
  }
</style>
</head>
<body>

<div id="stage">
  <div id="scene">
    <canvas id="stars" width="1920" height="1095"></canvas>
  </div>
</div>

<div id="hint">点这里播放背景音乐 →</div>
<button id="audio-toggle" aria-label="切换背景音乐" title="切换背景音乐">
  <svg viewBox="0 0 24 24" aria-hidden="true">
    <path id="icon-path" d="M3 9v6h4l5 4V5L7 9H3z"/>
  </svg>
</button>

<audio id="bgm" src="assets/lofi.mp3" loop preload="auto"></audio>

<script>
  // ---- fit the 1920x1095 stage into the viewport, preserving aspect ratio ----
  const SCENE_W = 1920;
  const SCENE_H = 1095;
  const scene = document.getElementById('scene');
  const portrait = window.matchMedia('(orientation: portrait)');
  function fit() {
    if (portrait.matches) {
      scene.style.transform = '';
      return;
    }
    const s = Math.min(window.innerWidth / SCENE_W, window.innerHeight / SCENE_H);
    scene.style.transform = `scale(${s})`;
  }
  fit();
  window.addEventListener('resize', fit);
  window.addEventListener('orientationchange', fit);
  portrait.addEventListener?.('change', fit);

  // ---- star particles ----
  // Y-coordinates in scene.json use a bottom-origin convention. We flip them to
  // top-origin (CSS) by Y_css = SCENE_H - y.
  const emitters = [
    { name: 'Top Left',       x:  370.06, y:  908.25, scale: 1.00, count: 24 },
    { name: 'Middle Left',    x:  461.05, y:  590.61, scale: 1.00, count: 24 },
    { name: 'Outside Left',   x:  -32.20, y:  584.65, scale: 1.00, count: 20 },
    { name: 'Top Middle',     x:  950.86, y:  914.30, scale: 1.00, count: 24 },
    { name: 'Bottom Mid A',   x: 1012.47, y:  646.39, scale: 0.64, alpha: 0.75, count: 12 },
    { name: 'Bottom Mid B',   x:  688.76, y:  440.84, scale: 0.64, alpha: 0.75, count: 12 },
    { name: 'Bottom Mid C',   x: 1362.51, y:  425.21, scale: 0.64, alpha: 0.75, count: 12 },
    { name: 'Top Right',      x: 1581.53, y:  830.12, scale: 1.00, count: 24 },
    { name: 'Middle Right',   x: 1634.70, y:  612.30, scale: 1.00, count: 24 },
    { name: 'Outside Right',  x: 2005.89, y:  590.39, scale: 1.00, count: 20 },
  ];

  const canvas = document.getElementById('stars');
  const ctx = canvas.getContext('2d');

  const stars = [];
  for (const e of emitters) {
    const cssX = e.x;
    const cssY = SCENE_H - e.y;
    const radius = 140 * e.scale; // emitter spread in scene units
    const maxAlpha = e.alpha ?? 1.0;
    for (let i = 0; i < e.count; i++) {
      const t = Math.random() * Math.PI * 2;
      const r = Math.sqrt(Math.random()) * radius;
      stars.push({
        x: cssX + Math.cos(t) * r,
        y: cssY + Math.sin(t) * r,
        size: (Math.random() * 1.4 + 0.6) * (0.7 + e.scale * 0.6),
        // twinkle: each star has its own phase + speed
        phase: Math.random() * Math.PI * 2,
        speed: 0.6 + Math.random() * 1.4,
        baseAlpha: (0.35 + Math.random() * 0.55) * maxAlpha,
      });
    }
  }

  // shooting star — single instance, periodically recycled
  const shooter = {
    active: false,
    nextAt: 1.2,
    x: 0, y: 0,
    vx: 0, vy: 0,
    life: 0,
    maxLife: 1.4,
  };

  function launchShooter() {
    // launch from upper-left-ish to lower-right; slight randomization
    const startX = 200 + Math.random() * 600;
    const startY = 50 + Math.random() * 200;
    const angle = (Math.PI / 7) + Math.random() * (Math.PI / 6); // ~25° to ~55°
    const speed = 1100 + Math.random() * 600; // px/sec at scene scale
    shooter.x = startX;
    shooter.y = startY;
    shooter.vx = Math.cos(angle) * speed;
    shooter.vy = Math.sin(angle) * speed;
    shooter.life = 0;
    shooter.active = true;
    shooter.trail = [];
  }

  let last = performance.now();
  function frame(now) {
    const dt = Math.min(0.05, (now - last) / 1000);
    last = now;

    ctx.clearRect(0, 0, SCENE_W, SCENE_H);

    // twinkling stars
    for (const s of stars) {
      s.phase += dt * s.speed;
      const tw = 0.5 + 0.5 * Math.sin(s.phase);
      const a = s.baseAlpha * (0.25 + tw * 0.75);
      const r = s.size * (0.85 + tw * 0.35);
      ctx.beginPath();
      ctx.arc(s.x, s.y, r, 0, Math.PI * 2);
      // soft glow via radial gradient is expensive — use additive composite + fill
      ctx.fillStyle = `rgba(255, 240, 210, ${a})`;
      ctx.fill();
      // tiny halo
      ctx.beginPath();
      ctx.arc(s.x, s.y, r * 2.6, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(255, 230, 180, ${a * 0.12})`;
      ctx.fill();
    }

    // shooting star
    shooter.nextAt -= dt;
    if (!shooter.active && shooter.nextAt <= 0) {
      launchShooter();
      shooter.nextAt = 6 + Math.random() * 9; // next one in 6-15s
    }
    if (shooter.active) {
      shooter.x += shooter.vx * dt;
      shooter.y += shooter.vy * dt;
      shooter.life += dt;
      const t = shooter.life / shooter.maxLife;
      if (t >= 1 || shooter.x > SCENE_W + 200 || shooter.y > SCENE_H + 200) {
        shooter.active = false;
      } else {
        // draw a streak: short bright head + fading tail in the opposite direction of velocity
        const ang = Math.atan2(shooter.vy, shooter.vx);
        const tailLen = 220;
        const tx = shooter.x - Math.cos(ang) * tailLen;
        const ty = shooter.y - Math.sin(ang) * tailLen;
        const grad = ctx.createLinearGradient(shooter.x, shooter.y, tx, ty);
        const headA = (1 - t) * 0.95;
        grad.addColorStop(0, `rgba(255, 255, 235, ${headA})`);
        grad.addColorStop(0.4, `rgba(200, 220, 255, ${headA * 0.5})`);
        grad.addColorStop(1, `rgba(180, 200, 255, 0)`);
        ctx.strokeStyle = grad;
        ctx.lineWidth = 2.4;
        ctx.lineCap = 'round';
        ctx.beginPath();
        ctx.moveTo(tx, ty);
        ctx.lineTo(shooter.x, shooter.y);
        ctx.stroke();
        // bright head dot
        ctx.beginPath();
        ctx.arc(shooter.x, shooter.y, 2.2, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(255, 255, 245, ${headA})`;
        ctx.fill();
      }
    }

    requestAnimationFrame(frame);
  }
  requestAnimationFrame((t) => { last = t; frame(t); });

  // ---- audio ----
  const bgm = document.getElementById('bgm');
  bgm.volume = 0.6;
  const btn = document.getElementById('audio-toggle');
  const iconPath = document.getElementById('icon-path');
  const ICON_PLAY  = "M3 9v6h4l5 4V5L7 9H3z";
  const ICON_PAUSE = "M3 9v6h4l5 4V5L7 9H3zm11.5-.5a4.5 4.5 0 0 1 0 7v-7zm0-4a8.5 8.5 0 0 1 0 15v-2.1a6.4 6.4 0 0 0 0-10.8V4.5z";
  let playing = false;
  const hint = document.getElementById('hint');
  btn.addEventListener('click', async () => {
    try {
      if (playing) {
        bgm.pause();
        playing = false;
        iconPath.setAttribute('d', ICON_PLAY);
      } else {
        await bgm.play();
        playing = true;
        iconPath.setAttribute('d', ICON_PAUSE);
        hint.classList.add('gone');
      }
    } catch (err) {
      console.warn('audio play blocked:', err);
    }
  });
  // auto-hide hint after a while
  setTimeout(() => hint.classList.add('gone'), 8000);
</script>
</body>
</html>
